project_name: unbox
builds:
  - main: .
    binary: unbox
    id: default
    env: [CGO_ENABLED=0]
    goos:
      - linux
      - windows
      - darwin
    goarch:
      - 386
      - amd64
      - arm
      - arm64
    goarm:
      - "5"
      - "6"
      - "7"
    ignore:
      - goos: darwin
        goarch: 386
      - goos: darwin
        goarch: arm
      - goos: windows
        goarch: 386
      - goos: windows
        goarch: arm

nfpms:
  - maintainer: aceberg <aceberg_a@proton.me>
    description: tool to convert a file with VLESS links to a full sing-box config
    homepage: https://github.com/aceberg/unbox
    license: MIT
    section: utils
    formats:
    - deb
    - rpm
    - apk

archives:
  - files:
    - LICENSE
    - README.md
    - src: ./configs/install.sh
      dst: install.sh
    wrap_in_directory: true
    format_overrides:
    - goos: windows
      format: zip

checksum:
  name_template: "checksums.txt"
